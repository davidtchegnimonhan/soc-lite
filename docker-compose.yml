version: '3.8'

services:
  soc-lite:
    build: .
    container_name: soc-lite-dashboard
    ports:
      - "5000:5000"
    volumes:
      # Mount your Apache logs here
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
